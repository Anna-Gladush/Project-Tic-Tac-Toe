<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
  <audio data-key="1" src="audio/tie.mp3"></audio>
  <audio data-key="2" src="audio/win.mp3"></audio>
  <audio data-key="3" src="audio/turn.mp3"></audio>

  <div class="start">

  </div>
  <div>
    <button class="btn-play">Play</button>
    <button class="btn-reset">Reset</button>
  </div>

  <div class="board">
    <div class="row">
      <div class="cell" data-id="1"></div>
      <div class="cell" data-id="2"></div>
      <div class="cell" data-id="3"></div>
    </div>
    <div class="row">
      <div class="cell" data-id="4"></div>
      <div class="cell" data-id="5"></div>
      <div class="cell" data-id="6"></div>
    </div>
    <div class="row">
      <div class="cell" data-id="7"></div>
      <div class="cell" data-id="8"></div>
      <div class="cell" data-id="9"></div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
